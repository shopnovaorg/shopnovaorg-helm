# ─────────────────────────────────────────────────────────────────────────────
# MongoDB StatefulSets + Headless Services — PROD namespace
# Each microservice gets its own isolated MongoDB instance
# Using NFS-backed persistent storage + presentation-safe MongoDB resources
# ─────────────────────────────────────────────────────────────────────────────

# ══ AUTH-DB ══════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: prod
  labels:
    app: auth-db
spec:
  clusterIP: None
  selector:
    app: auth-db
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: prod
  labels:
    app: auth-db
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          args:
            - --wiredTigerCacheSizeGB
            - "0.25"
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-storage
        resources:
          requests:
            storage: 1Gi

---
