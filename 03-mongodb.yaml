# ─────────────────────────────────────────────────────────────────────────────
# MongoDB StatefulSets + Headless Services — PROD namespace
# Each microservice gets its own isolated MongoDB instance.
# storageClassName: local-path  ← for immediate testing with local-path-provisioner
# When NFS is ready: change to  storageClassName: nfs-storage
# ─────────────────────────────────────────────────────────────────────────────

# ══ AUTH-DB ══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: prod
  labels:
    app: auth-db
spec:
  clusterIP: None   # Headless — stable pod DNS: auth-db-0.auth-db.prod.svc.cluster.local
  selector:
    app: auth-db
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: prod
  labels:
    app: auth-db
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
---
