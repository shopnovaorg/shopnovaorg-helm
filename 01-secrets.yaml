# ─────────────────────────────────────────────────────────────────
# ShopNova PROD Secrets
# IMPORTANT: Edit these values before applying!
# Use stringData — Kubernetes will base64 encode internally.
# Never commit this file with real credentials to git.
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: shopnova-secrets
  namespace: prod
type: Opaque
stringData:
  # MongoDB connection strings — use K8s headless service DNS (short form within same namespace)
  AUTH_MONGO_URI: "mongodb://auth-db:27017/authdb"
  PRODUCT_MONGO_URI: "mongodb://product-db:27017/productdb"
  ORDER_MONGO_URI: "mongodb://order-db:27017/orderdb"

  # Change this to a long random string!
  # Generate one with: openssl rand -hex 32
  JWT_SECRET: "REPLACE_WITH_SECURE_RANDOM_STRING_64_CHARS_MINIMUM"

  # Gmail credentials for notification service
  EMAIL_USER: "your-gmail@gmail.com"
  EMAIL_PASS: "your-gmail-app-password"
