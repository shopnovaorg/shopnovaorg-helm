apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopnova-sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/managed-by: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/shopnovaorg/shopnovaorg-helm
    targetRevision: main        # sealed secrets live on main (both dev+prod encrypted here)
    path: sealed-secrets        # folder with dev-sealed-secret.yaml + prod-sealed-secret.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default          # fallback only — each SealedSecret has its own namespace
                                # (dev-sealed-secret.yaml → namespace: dev)
                                # (prod-sealed-secret.yaml → namespace: prod)

  syncPolicy:
    automated:
      prune: true               # remove sealed secrets deleted from repo
      selfHeal: true            # revert any manual changes
    syncOptions:
      - RespectIgnoreDifferences=true
