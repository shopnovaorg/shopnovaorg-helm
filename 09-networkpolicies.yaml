# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicies — PROD namespace
# CNI: WeaveNet (supports Kubernetes NetworkPolicy natively)
#
# Strategy:
#   1. Default deny ALL ingress + egress for every pod
#   2. Explicitly allow only required paths
#   3. Always allow DNS egress (UDP/TCP 53 to kube-system)
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. Default Deny All ──────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: prod
spec:
  podSelector: {}    # Applies to ALL pods in prod namespace
  policyTypes:
    - Ingress
    - Egress
---
# ── 2. Allow DNS egress for all pods (required for K8s service discovery) ────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── 3. kgateway → frontend (static file serving) ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-frontend
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: 3000
---
# ── 4. kgateway → auth-service ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-auth
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: 8001
---
# ── 5. kgateway → product-service ────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-product
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: 8002
---
# ── 6. kgateway → order-service ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-order
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: 8003
---
# ── 7. order-service → notification-service (internal only) ──────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-to-notification
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 8004
---
# ── 8. auth-service → auth-db ────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-to-authdb
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: auth-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 27017
---
# ── 9. product-service → product-db ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-product-to-productdb
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: product-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 27017
---
# ── 10. order-service → order-db ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-to-orderdb
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: order-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 27017
---
# ── 11. Egress: auth-service → auth-db ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: auth-db
      ports:
        - port: 27017
---
# ── 12. Egress: product-service → product-db ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-product-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: product-db
      ports:
        - port: 27017
---
# ── 13. Egress: order-service → order-db + notification-service ──────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: order-db
      ports:
        - port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 8004
---
# ── 14. Egress: notification-service → internet (Gmail SMTP) ─────────────────
# Nodemailer connects to smtp.gmail.com:587 — requires external egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-notification-external-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Egress
  egress:
    - {}    # Allow all egress — Gmail SMTP requires open internet access
