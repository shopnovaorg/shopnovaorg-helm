# ── Application ConfigMap (non-sensitive config) ────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopnova-config
  namespace: prod
data:
  NODE_ENV: "production"
  AUTH_PORT: "8001"
  PRODUCT_PORT: "8002"
  ORDER_PORT: "8003"
  NOTIFICATION_PORT: "8004"
  FRONTEND_PORT: "3000"
  # Order service uses these to call notification service via K8s DNS
  NOTIFICATION_SERVICE_HOST: "notification-service"
  NOTIFICATION_SERVICE_PORT: "8004"
---
# ── Nginx ConfigMap (K8s version — static files only, no proxy_pass) ────────
# This ConfigMap is mounted into the frontend pod at:
#   /etc/nginx/conf.d/default.conf
# It OVERRIDES the proxy_pass nginx.conf baked into the image.
# In K8s, kgateway handles all /api/* routing — nginx only needs to serve static files.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: prod
data:
  default.conf: |
    server {
        listen 3000;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback for React Router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    }
