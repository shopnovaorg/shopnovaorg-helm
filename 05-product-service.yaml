# ── Product Service Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: prod
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: product-service
          image: abhinavbabu33/shopnova-product-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnova-config
                  key: PRODUCT_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: shopnova-config
                  key: NODE_ENV
            - name: PRODUCT_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: shopnova-secrets
                  key: PRODUCT_MONGO_URI
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
# ── Product Service ClusterIP Service ────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: prod
  labels:
    app: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
---
# ── Product Service HPA ───────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
