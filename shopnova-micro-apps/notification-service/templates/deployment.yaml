{{- /* notification-service templates — Argo Rollouts blue-green (no HPA) */}}

{{- /* ── Active Service (live traffic) ─────────────────────────────────── */}}
apiVersion: v1
kind: Service
metadata:
  name: notification-service-active
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
---
{{- /* ── Preview Service (pre-promotion / test traffic) ───────────────── */}}
apiVersion: v1
kind: Service
metadata:
  name: notification-service-preview
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
---
{{- /* ── Rollout (replaces Deployment, no HPA for this service) ───────── */}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notification-service
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: notification-service
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnova-config
                  key: NOTIFICATION_PORT
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: shopnova-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: shopnova-secrets
                  key: EMAIL_PASS
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  strategy:
    blueGreen:
      activeService: notification-service-active
      previewService: notification-service-preview
      autoPromotionEnabled: {{ .Values.rollout.autoPromotion }}
