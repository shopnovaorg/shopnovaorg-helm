# Notification Service ‚Äî prod values (main branch)
namespace: prod

image:
  repository: abhinavbabu33/shopnova-notification-service
  tag: notification-service-v0.2.0
  pullPolicy: Always

replicaCount: 1
port: 8004

# No HPA ‚Äî stateless best-effort email service

resources:
  requests:
    cpu: 64m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

rollout:
  autoPromotion: false   # prod ó manual promotion required
