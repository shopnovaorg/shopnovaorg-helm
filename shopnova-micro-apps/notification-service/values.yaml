# Notification Service ‚Äî dev values (dev branch)
namespace: dev

image:
  repository: abhinavbabu33/shopnova-notification-service
  tag: latest          # ‚Üê helm-updater-dev writes this field
  pullPolicy: Always

replicaCount: 1
port: 8004

# No HPA ‚Äî stateless best-effort email service

resources:
  requests:
    cpu: 64m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

rollout:
  autoPromotion: true   # dev ó auto promote after readiness checks
