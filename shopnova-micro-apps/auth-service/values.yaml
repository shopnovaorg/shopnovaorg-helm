# Auth Service ‚Äî dev values (dev branch)
namespace: dev

image:
  repository: abhinavbabu33/shopnova-auth-service
  tag: latest          # ‚Üê helm-updater-dev writes this field
  pullPolicy: Always

replicaCount: 1
port: 8001

hpa:
  minReplicas: 1
  maxReplicas: 2
  cpuUtilization: 70
  memoryUtilization: 80

resources:
  requests:
    cpu: 64m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

rollout:
  autoPromotion: true   # dev ó auto promote after readiness checks
