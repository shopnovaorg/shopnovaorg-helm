# Auth Service — dev values (dev branch)
namespace: dev

image:
  repository: abhinavbabu33/shopnova-auth-service
  tag: latest          # ← helm-updater-dev writes this field
  pullPolicy: Always

replicaCount: 1
port: 8001

hpa:
  minReplicas: 1
  maxReplicas: 2
  cpuUtilization: 70
  memoryUtilization: 80

resources:
  requests:
    cpu: 64m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
