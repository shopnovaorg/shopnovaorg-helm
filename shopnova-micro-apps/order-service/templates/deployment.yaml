{{- /* order-service templates — Argo Rollouts blue-green */}}

{{- /* ── Active Service (live traffic) ─────────────────────────────────── */}}
apiVersion: v1
kind: Service
metadata:
  name: order-service-active
  namespace: {{ .Values.namespace }}
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
---
{{- /* ── Preview Service (pre-promotion / test traffic) ───────────────── */}}
apiVersion: v1
kind: Service
metadata:
  name: order-service-preview
  namespace: {{ .Values.namespace }}
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
---
{{- /* ── Rollout (replaces Deployment) ──────────────────────────────────── */}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: order-service
  namespace: {{ .Values.namespace }}
  labels:
    app: order-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: order-service
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnova-config
                  key: ORDER_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: shopnova-config
                  key: NODE_ENV
            - name: ORDER_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: shopnova-secrets
                  key: ORDER_MONGO_URI
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  strategy:
    blueGreen:
      activeService: order-service-active
      previewService: order-service-preview
      autoPromotionEnabled: {{ .Values.rollout.autoPromotion }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: order-service
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpuUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.memoryUtilization }}
