# Order Service ‚Äî prod values (main branch)
namespace: prod

image:
  repository: abhinavbabu33/shopnova-order-service
  tag: order-service-v0.0.1
  pullPolicy: Always

replicaCount: 1
port: 8003

hpa:
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryUtilization: 80

resources:
  requests:
    cpu: 128m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

rollout:
  autoPromotion: false   # prod ó manual promotion required
