# Frontend Service — dev values (dev branch)
namespace: dev

image:
  repository: abhinavbabu33/shopnova-frontend
  tag: latest          # ← helm-updater-dev writes this field
  pullPolicy: Always

replicaCount: 1
port: 3000

hpa:
  minReplicas: 1
  maxReplicas: 2
  cpuUtilization: 70

resources:
  requests:
    cpu: 64m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

rollout:
  autoPromotion: true   # dev � auto promote after readiness checks
