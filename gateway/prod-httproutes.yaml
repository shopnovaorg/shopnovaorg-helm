# HTTPRoutes for PROD namespace
# All routes reference the shopnova-gateway in the prod namespace.
# Path precedence: longer prefix wins (Gateway API spec).
# /api/auth (9 chars) > / (1 char) — so API routes always win over catch-all.

# ── /api/auth → auth-service:8001 ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: prod
spec:
  parentRefs:
    - name: shopnova-gateway
      namespace: prod
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 8001
---
# ── /api/products → product-service:8002 ───────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: product-route
  namespace: prod
spec:
  parentRefs:
    - name: shopnova-gateway
      namespace: prod
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: product-service
          port: 8002
---
# ── /api/orders → order-service:8003 ───────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: order-route
  namespace: prod
spec:
  parentRefs:
    - name: shopnova-gateway
      namespace: prod
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      backendRefs:
        - name: order-service
          port: 8003
---
# ── / → frontend-service:3000 (catch-all, lowest priority) ─────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: prod
spec:
  parentRefs:
    - name: shopnova-gateway
      namespace: prod
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 3000
