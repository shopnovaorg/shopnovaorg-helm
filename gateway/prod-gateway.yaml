# Gateway for PROD namespace
# kgateway controller creates a Service (LoadBalancer/NodePort) for this Gateway.
# After applying, patch it to NodePort 30080:
#   kubectl patch svc shopnova-gateway -n prod \
#     -p '{"spec":{"type":"NodePort","ports":[{"port":80,"targetPort":10080,"nodePort":30080,"protocol":"TCP"}]}}'
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shopnova-gateway
  namespace: prod
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
